<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作管理器</title>
<link rel="stylesheet" href="/static/app.css?v=1782458988">
</head>
<body>

<div class="app">
  <header class="topbar">
    <h1>工作管理器</h1>
    <div class="topbar-status off" id="topbarStatus" onclick="App.scrollToSidebar()"></div>
    <span class="conn off" id="connBadge" onclick="App.retryConnect()" title="点击重试连接">离线</span>
    <button class="btn btn-ghost btn-sm" id="btnFloat" onclick="App.floatShow()">悬浮窗</button>
    <button class="btn btn-primary btn-sm" onclick="App.modalOpen()">+ 新任务</button>
  </header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="mainArea">
    <div class="tabs">
      <button class="tab${activeTab === 'tasks' ? ' on' : ''}" onclick="App.setTab('tasks')">任务列表</button>
      <button class="tab${activeTab === 'timeline' ? ' on' : ''}" onclick="App.setTab('timeline')">今日时间线</button>
    </div>
    <div id="taskList" class="tab-pane${activeTab === 'tasks' ? '' : ' off'}"></div>
    <div id="timeline" class="tab-pane timeline-sec${activeTab === 'timeline' ? '' : ' off'}"></div>
  </main>
</div>

<div class="overlay off" id="overlay"></div>
<div class="reminder off" id="reminder"></div>
<div class="switch-confirm off" id="switchConfirm"></div>
<div class="fw-badge off" id="fwBadge" onclick="App.floatFocus()">
  <span class="fw-badge-dot"></span> 悬浮窗已打开 — 点击切换
</div>
<div class="toast-wrap" id="toasts"></div>

<script src="/static/app.js?v=1782459039"></script>
</body>
</html>
